services:
  - type: web
    name: packetlab-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py create_default_admin && python manage.py import_pcap_labs
    startCommand: gunicorn packetlab_backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DB_NAME
        fromDatabase:
          name: packetlab-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: packetlab-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: packetlab-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: packetlab-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: packetlab-db
          property: port
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: packetlab-db
    plan: free
    databaseName: packetlab
